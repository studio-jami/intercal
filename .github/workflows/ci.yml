name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: intercal
          POSTGRES_PASSWORD: intercal
          POSTGRES_DB: intercal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intercal -d intercal"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://intercal:intercal@localhost:5432/intercal
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install TypeScript deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: uv sync --all-packages --all-extras

      - name: Build contracts
        run: pnpm contracts:build

      - name: Build shared package
        run: pnpm --filter @intercal/shared build

      - name: Build core package
        run: pnpm --filter @intercal/core build

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck (TS)
        run: pnpm typecheck

      - name: Contracts drift
        run: pnpm contracts:check

      - name: Python lint (Ruff)
        run: pnpm py:lint

      - name: Python typecheck (Pyright)
        run: pnpm py:typecheck

      - name: Migrate (clean + seeded)
        run: pnpm db:migrate:seeded

      - name: Tests
        run: pnpm test

      - name: Python tests
        run: pnpm py:test

  # Scheduled pipeline CD lives in pipeline.yml (cron + workflow_dispatch), driving the
  # portable `intercal-pipeline` CLI on the public repo's free Actions minutes (Plan 07 W3).
