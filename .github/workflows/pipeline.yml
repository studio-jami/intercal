name: Pipeline (scheduled CD)

# Recurring ingestion → … → fact-versioning on the public repo's free Actions minutes
# (decision D11: portable worker CLI; the same `intercal-pipeline` entrypoint runs here,
# locally, and as a Cloud Run Job in Plan 07 W4).
#
# Cadence: every 6h, per docs/operations/resource-budget.md (INGEST_CRON=0 */6 * * *).
# The minute is offset off :00 because GitHub may drop schedules queued at the top of the
# hour under load (docs.github.com — schedule event caveats). GitHub's cron is parsed
# statically and cannot read a secret/var, so the cadence is pinned here; changing it is a
# one-line edit that should track resource-budget.md and INGEST_CRON.
#
# Each run is short, idempotent (re-runs never duplicate canonical records — see
# intercal_pipeline.run) and budget-bounded (INGEST_MAX_DOCS_PER_RUN, LLM_DAILY_REQUEST_BUDGET,
# EXTRACT_ONLY_CHANGED), so overlapping/duplicate runs are safe but still guarded below.

on:
  schedule:
    - cron: "17 */6 * * *" # every 6h at :17 — see resource-budget.md / INGEST_CRON
  workflow_dispatch:
    inputs:
      mode:
        description: "run-all, run (one source), or backfill (date-windowed historical execution)"
        type: choice
        required: true
        default: run-all
        options:
          - run-all
          - run
          - backfill
      source_id:
        description: "Source UUID (required when mode=run; optional allowlist when mode=backfill)"
        type: string
        required: false
        default: ""
      source_slug:
        description: "Optional source slug allowlist for mode=backfill"
        type: string
        required: false
        default: ""
      source_class:
        description: "Optional metadata.source_class filter for mode=backfill"
        type: string
        required: false
        default: ""
      adapter_name:
        description: "Optional adapter_name filter for mode=backfill"
        type: string
        required: false
        default: ""
      start_date:
        description: "Optional backfill start date (YYYY-MM-DD)"
        type: string
        required: false
        default: ""
      end_date:
        description: "Optional backfill end date (YYYY-MM-DD)"
        type: string
        required: false
        default: ""
      max_documents:
        description: "Per-source document cap for this run (0 = INGEST_MAX_DOCS_PER_RUN)"
        type: string
        required: false
        default: "0"
      max_sources:
        description: "Maximum selected sources for mode=backfill (0 = no explicit cap)"
        type: string
        required: false
        default: "0"
      no_embeddings:
        description: "Skip embedding-based resolve/link (faster; exact-match only)"
        type: boolean
        required: false
        default: false
      dry_run:
        description: "For mode=backfill, print selected sources and controls without fetching or writing"
        type: boolean
        required: false
        default: false
      database_url_override:
        description: "Override DATABASE_URL for a SAFE test run (e.g. a throwaway Neon branch). Leave blank to use the production secret."
        type: string
        required: false
        default: ""

# Serialize runs: a scheduled and a manual run never execute the pipeline concurrently.
# cancel-in-progress=false — a mid-flight run is idempotent and worth finishing; the new
# run queues behind it rather than being killed or double-writing.
concurrency:
  group: intercal-pipeline
  cancel-in-progress: false

# Least privilege: the job only reads the checked-out tree. No write scopes needed.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # ── Canonical store (Neon). A manual run may override to a throwaway branch. ──
      DATABASE_URL: ${{ github.event.inputs.database_url_override != '' && github.event.inputs.database_url_override || secrets.DATABASE_URL }}
      # ── Object storage (R2 via S3 API) ──
      STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      # ── Queue / cache (Upstash) ──
      QUEUE_PROVIDER: ${{ secrets.QUEUE_PROVIDER }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # ── Embeddings (local fastembed — zero cost) ──
      EMBEDDINGS_PROVIDER: ${{ secrets.EMBEDDINGS_PROVIDER }}
      EMBEDDINGS_MODEL: ${{ secrets.EMBEDDINGS_MODEL }}
      EMBEDDINGS_DIM: ${{ secrets.EMBEDDINGS_DIM }}
      EMBEDDINGS_BATCH_SIZE: ${{ vars.EMBEDDINGS_BATCH_SIZE || '64' }}
      # ── LLM (vertex primary → gemini fallback) ──
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}
      # ── Budget knobs (resource-budget.md). Repo vars override the in-code defaults. ──
      INGEST_MAX_DOCS_PER_RUN: ${{ vars.INGEST_MAX_DOCS_PER_RUN || '200' }}
      EXTRACT_ONLY_CHANGED: ${{ vars.EXTRACT_ONLY_CHANGED || 'true' }}
      LLM_DAILY_REQUEST_BUDGET: ${{ vars.LLM_DAILY_REQUEST_BUDGET || '2000' }}
      LLM_MAX_OUTPUT_TOKENS: ${{ vars.LLM_MAX_OUTPUT_TOKENS || '2048' }}
      LLM_PRIMARY: ${{ vars.LLM_PRIMARY || 'vertex' }}
      # ── Observability ──
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        # setup-uv stopped publishing a moving major tag at v8 (immutable/secure
        # releases); pin an exact version. Latest: v8.2.0 (2026-06-03).
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install pipeline + worker packages
        # --all-extras pulls intercal-shared's runtime adapter extras (storage-s3 /
        # aioboto3, source-http, embeddings-local/fastembed, llm-gemini, queue-redis).
        # Without them the real pipeline run fails at adapter construction (ImportError).
        run: uv sync --all-packages --all-extras --frozen

      # Vertex ADC: the fanned GOOGLE_SERVICE_ACCOUNT_KEY secret holds the SA JSON.
      # Write it to a file and point the standard SDK env var at it. Only runs when the
      # secret is present; the file is under the runner's ephemeral workspace and never
      # echoed. (When LLM_PROVIDER=gemini the key path is unused — GEMINI_API_KEY drives it.)
      - name: Configure Vertex ADC (if SA key present)
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_KEY_JSON}" ]; then
            echo "No GOOGLE_SERVICE_ACCOUNT_KEY secret set; relying on GEMINI_API_KEY / ambient ADC."
            exit 0
          fi
          install -m 600 /dev/null "$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_KEY_JSON" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run pipeline
        id: pipeline
        env:
          PIPELINE_MODE: ${{ github.event.inputs.mode || 'run-all' }}
          PIPELINE_SOURCE_ID: ${{ github.event.inputs.source_id }}
          PIPELINE_SOURCE_SLUG: ${{ github.event.inputs.source_slug }}
          PIPELINE_SOURCE_CLASS: ${{ github.event.inputs.source_class }}
          PIPELINE_ADAPTER_NAME: ${{ github.event.inputs.adapter_name }}
          PIPELINE_START_DATE: ${{ github.event.inputs.start_date }}
          PIPELINE_END_DATE: ${{ github.event.inputs.end_date }}
          PIPELINE_MAX_DOCS: ${{ github.event.inputs.max_documents || '0' }}
          PIPELINE_MAX_SOURCES: ${{ github.event.inputs.max_sources || '0' }}
          PIPELINE_NO_EMBEDDINGS: ${{ github.event.inputs.no_embeddings }}
          PIPELINE_DRY_RUN: ${{ github.event.inputs.dry_run }}
          PIPELINE_DB_OVERRIDDEN: ${{ github.event.inputs.database_url_override != '' }}
        run: |
          set -euo pipefail

          if [ "$PIPELINE_DB_OVERRIDDEN" = "true" ]; then
            echo "::notice::DATABASE_URL overridden by workflow input (safe test target)."
          fi

          ARGS=()
          if [ "$PIPELINE_MODE" = "run" ]; then
            if [ -z "${PIPELINE_SOURCE_ID}" ]; then
              echo "::error::mode=run requires a source_id input."
              exit 1
            fi
            ARGS+=(run --source-id "$PIPELINE_SOURCE_ID")
          elif [ "$PIPELINE_MODE" = "backfill" ]; then
            ARGS+=(backfill)
            if [ -n "${PIPELINE_SOURCE_ID}" ]; then
              ARGS+=(--source-id "$PIPELINE_SOURCE_ID")
            fi
            if [ -n "${PIPELINE_SOURCE_SLUG}" ]; then
              ARGS+=(--source-slug "$PIPELINE_SOURCE_SLUG")
            fi
            if [ -n "${PIPELINE_SOURCE_CLASS}" ]; then
              ARGS+=(--source-class "$PIPELINE_SOURCE_CLASS")
            fi
            if [ -n "${PIPELINE_ADAPTER_NAME}" ]; then
              ARGS+=(--adapter-name "$PIPELINE_ADAPTER_NAME")
            fi
            if [ -n "${PIPELINE_START_DATE}" ]; then
              ARGS+=(--start-date "$PIPELINE_START_DATE")
            fi
            if [ -n "${PIPELINE_END_DATE}" ]; then
              ARGS+=(--end-date "$PIPELINE_END_DATE")
            fi
            if [ "${PIPELINE_MAX_SOURCES}" != "0" ]; then
              ARGS+=(--max-sources "$PIPELINE_MAX_SOURCES")
            fi
            if [ "${PIPELINE_DRY_RUN}" = "true" ]; then
              ARGS+=(--dry-run)
            fi
          else
            ARGS+=(run-all)
          fi

          if [ "${PIPELINE_MAX_DOCS}" != "0" ]; then
            ARGS+=(--max-documents "$PIPELINE_MAX_DOCS")
          fi
          if [ "${PIPELINE_NO_EMBEDDINGS}" = "true" ]; then
            ARGS+=(--no-embeddings)
          fi

          # The CLI writes its JSON health summary to stderr and exits non-zero on a
          # failed run. Capture stderr so the run summary can surface the counts while
          # the exit status still fails the job loudly on real errors.
          set +e
          uv run intercal-pipeline "${ARGS[@]}" 2> >(tee "$RUNNER_TEMP/pipeline.log" >&2)
          status=$?
          set -e

          # Extract the JSON health object(s) from the captured log for the step summary.
          # No secrets are present in the health summary (counters + timing + status only).
          {
            echo "### Pipeline run summary"
            echo ""
            echo "- mode: \`$PIPELINE_MODE\`"
            echo "- exit status: \`$status\`"
            echo ""
            echo '```json'
            # Print from the first JSON token to end of log (the trailing health dump).
            awk 'f{print} /^[[{]/{f=1; print}' "$RUNNER_TEMP/pipeline.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit $status

      # Defense-in-depth: shred the SA-key file even if the run failed/timed out.
      # GitHub-hosted runners are ephemeral (the workspace is destroyed after the job),
      # but an explicit always-run cleanup keeps the credential from outliving the step
      # on self-hosted/reused runners and makes the secret's lifetime obvious. No value
      # is printed; `rm -f` is a no-op when the key was absent (Gemini-only runs).
      - name: Remove Vertex ADC key file
        if: always()
        run: rm -f "$RUNNER_TEMP/gcp-sa.json"
