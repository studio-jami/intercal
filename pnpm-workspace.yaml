packages:
  - "packages/*"

onlyBuiltDependencies:
  - esbuild
  - sharp

# Shared, single-sourced dependency versions (pnpm catalog).
# Reference in package.json as e.g. "hono": "catalog:".
catalog:
  # Language / build
  typescript: ^6.0.3
  tsx: ^4.20.0
  vitest: ^4.1.9
  "@types/node": ^26.0.0

  # Contracts (TypeSpec -> OpenAPI 3.1 + JSON Schema)
  "@typespec/compiler": ^1.13.0
  "@typespec/http": ^1.13.0
  "@typespec/rest": ^0.83.0
  "@typespec/openapi3": ^1.13.0
  "@typespec/json-schema": ^1.13.0
  openapi-typescript: ^7.9.0

  # API runtime (Hono runs on Node, Cloudflare, Vercel, Bun — deploy-agnostic)
  hono: ^4.12.27
  "@hono/node-server": ^2.0.5
  ajv: ^8.17.0
  ajv-formats: ^3.0.1

  # Database (SQL-first; Kysely for typed reads only)
  kysely: ^0.29.2
  pg: ^8.22.0
  "@types/pg": ^8.11.0

  # MCP
  "@modelcontextprotocol/sdk": ^1.29.0
  # JOSE (JWT/JWKS) for MCP OAuth 2.1 resource-server token verification. Pinned to the same major
  # the MCP SDK depends on, so one resolved copy serves both (no duplicate jose in the tree).
  jose: ^6.1.0

  # Frontend
  next: ^16.2.9
  react: ^19.2.0
  react-dom: ^19.2.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.0
  tailwindcss: ^4.3.1
  "@tailwindcss/postcss": ^4.3.1

  # Observability (optional, behind adapter)
  pino: ^10.3.1
