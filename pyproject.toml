[project]
name = "intercal"
version = "0.0.0"
description = "Intercal Python services workspace — ingestion, extraction, resolution, synthesis."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }

# The root is a non-packaged workspace aggregator; real code lives in services/*.
[tool.uv.workspace]
members = ["services/*"]

[tool.uv.sources]
intercal-shared = { workspace = true }

# Dev tooling shared across all services.
[dependency-groups]
dev = [
    "ruff>=0.14.0",
    "pyright>=1.1.400",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["services"]
# Generated by the contracts pipeline (datamodel-codegen). Never lint/format — that would
# fight the generator and trip the contracts drift check.
extend-exclude = ["**/intercal_shared/contracts/models.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC", "RUF"]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["services"]
exclude = ["**/__pycache__", "**/.venv", "**/intercal_shared/contracts/models.py"]
# Provider SDKs (anthropic, redis, asyncpg, fastembed, …) ship incomplete type info, so
# "unknown type" leaks out of adapter boundaries. Keep these visible as warnings rather than
# failing the gate; every other strict check stays an error.
reportUnknownMemberType = "warning"
reportUnknownVariableType = "warning"
reportUnknownArgumentType = "warning"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["services"]
